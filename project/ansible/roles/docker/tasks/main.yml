---
- name: Docker installation block
  become: true
  tags:
    - docker
    - docker_install
    - packages
  block:
    - name: Install prerequisites for Docker repository
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Create directory for Docker GPG key
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repo
      ansible.builtin.apt:
        update_cache: true

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
      notify: Restart docker

  rescue:
    - name: Wait before retry on failure
      ansible.builtin.pause:
        seconds: 10

    - name: Retry apt update
      ansible.builtin.apt:
        update_cache: true

    - name: Retry Docker installation
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present

- name: Docker configuration block
  become: true
  tags:
    - docker
    - docker_config
  block:
    - name: Ensure Docker service is started and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        groups: docker
        append: true

    - name: Install Python Docker libraries
      ansible.builtin.apt:
        name: "{{ docker_python_packages }}"
        state: present
        update_cache: true

  always:
    - name: Ensure Docker service is enabled
      ansible.builtin.service:
        name: docker
        enabled: true

- name: Reset SSH connection for docker group to take effect
  ansible.builtin.meta: reset_connection
  tags:
    - docker
    - docker_config
