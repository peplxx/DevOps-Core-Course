---
- name: Log in to Docker Hub
  docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
    registry_url: https://index.docker.io/v1/
  become: no
  no_log: true

- name: Pull Docker image
  docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_image_tag }}"
    source: pull
    force_source: "{{ container_pull | default(true) }}"

- name: Check if container exists
  command: docker ps -aq -f name={{ app_container_name }}
  register: container_exists
  changed_when: false
  failed_when: false

- name: Stop existing container (if running)
  command: docker stop {{ app_container_name }}
  when: container_exists.stdout != ""
  ignore_errors: yes

- name: Remove old container
  command: docker rm {{ app_container_name }}
  when: container_exists.stdout != ""
  ignore_errors: yes

- name: Run application container
  docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ app_port }}:{{ app_port }}"
    env: "{{ app_env }}"
    recreate: yes
  notify: verify application health

- name: Wait for application port to be available
  wait_for:
    host: localhost
    port: "{{ app_port }}"
    delay: 2
    timeout: 60
    state: started

- name: Verify application is responding
  uri:
    url: "http://localhost:{{ app_port }}/health"
    status_code: 200
    timeout: 10
  retries: 5
  delay: 5
  register: health_check
  until: health_check.status == 200
