---
- name: Package installation block
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Fix apt cache on failure
      ansible.builtin.command: apt-get update --fix-missing
      changed_when: true

    - name: Retry package installation
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present
        update_cache: true

  always:
    - name: Log package installation completion
      ansible.builtin.copy:
        content: "Package installation completed at {{ ansible_date_time.iso8601 }}\n"
        dest: /tmp/ansible_common_packages.log
        mode: "0644"

  become: true
  tags:
    - packages
    - common

- name: System configuration block
  block:
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Ensure pip is installed
      ansible.builtin.apt:
        name: python3-pip
        state: present

  become: true
  tags:
    - system
    - common
