replicaCount: 5

image:
  tag: "1.0.0"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

service:
  type: LoadBalancer
  nodePort: null

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 3
  timeoutSeconds: 3
  failureThreshold: 3

# RWO PVC cannot be mounted by multiple pods; keep persistence off when replicaCount > 1.
persistence:
  enabled: false
