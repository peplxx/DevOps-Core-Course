name: Docker Build Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHON_CONTEXT: ./project/app_python
  ZIG_CONTEXT: ./project/app_zig

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: python
            context: ./project/app_python
            file: ./project/app_python/Dockerfile
            tag: devops-info-service-python:test
          - name: zig
            context: ./project/app_zig
            file: ./project/app_zig/Dockerfile
            tag: devops-info-service-zig:test
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
